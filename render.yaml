services:
  - type: web
    name: vector-demo
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install -g pnpm@10 && pnpm install --frozen-lockfile && pnpm typecheck
    startCommand: npm run api
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: AGENT_DRY_RUN
        value: "true"
      - key: LLM_PROVIDER
        value: qwen
      - key: LLM_BASE_URL
        value: https://hackathon.bitgetops.com/v1
      - key: LLM_MODEL
        value: qwen3.6-flash
      - key: BITGET_API_BASE_URL
        value: https://api.bitget.com
      - key: SIGNAL_PROFILE
        value: balanced
      - key: LLM_API_KEY
        sync: false
      - key: EXA_API_KEY
        sync: false
